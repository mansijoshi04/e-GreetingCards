# Proxy config for staging.giflove.ca → localhost:3040
#
# This file is managed by CI/CD (deploy-staging.yml).
# It is safe to overwrite on every deploy — it contains only the proxy
# location block. SSL and server_name live in the site config managed
# by Certbot and are never touched after initial setup.
#
# Deployed to: /etc/nginx/conf.d/giflove-staging.conf

location / {
    proxy_pass http://localhost:3040;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeouts — reasonable for a Next.js SSR app
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
