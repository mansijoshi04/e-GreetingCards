version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: greeting-cards-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greeting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greeting_password}
      POSTGRES_DB: ${POSTGRES_DB:-greeting_cards}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greeting_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greeting-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: greeting-cards-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greeting-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greeting-cards-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-greeting_user}:${POSTGRES_PASSWORD:-greeting_password}@postgres:5432/${POSTGRES_DB:-greeting_cards}

      # Redis
      REDIS_URL: redis://redis:6379

      # App
      BASE_URL: http://localhost:3000
      NODE_ENV: development

      # Stripe (add your test keys)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # SendGrid (add your API key)
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-cards@localhost}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    networks:
      - greeting-network

    command: >
      sh -c "npx prisma migrate dev --name init || true &&
             npx prisma db seed || true &&
             npm run dev"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  greeting-network:
    driver: bridge
