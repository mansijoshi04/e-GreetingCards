# Production deployment — VPS port 3050 — giflove.ca
# Uses .env.prod (gitignored, placed manually on VPS — never written by CI/CD)
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    restart: unless-stopped
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - giflove_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - giflove_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO — self-hosted object storage (S3-compatible)
  # In production, /media/* requests are proxied through nginx to MinIO.
  # The MINIO_PUBLIC_URL in .env.prod should be https://giflove.ca/media
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env.prod            # reads MINIO_ROOT_USER + MINIO_ROOT_PASSWORD
    restart: unless-stopped
    volumes:
      - minio_prod_data:/data
    networks:
      - giflove_prod
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$MINIO_BUCKET_NAME &&
        mc anonymous set public local/$$MINIO_BUCKET_NAME &&
        echo 'MinIO bucket ready'
      "
    networks:
      - giflove_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --settings=giflove.settings.production &&
             gunicorn giflove.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: giflove.settings.production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - giflove_prod

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A giflove worker --loglevel=info
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: giflove.settings.production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - giflove_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://giflove.ca/api
    restart: unless-stopped
    networks:
      - giflove_prod

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3050:80"
    volumes:
      - ./nginx/giflove.ca:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - giflove_prod

volumes:
  postgres_prod_data:
  minio_prod_data:

networks:
  giflove_prod:
    driver: bridge
