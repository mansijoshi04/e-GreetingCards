# Local development — hot reload, no built images, source mounted as volumes.
#
# REQUIRED: Docker Compose reads .env.local for ${VAR} substitution (VITE_* vars
# in the frontend service). Always start with:
#
#   docker compose --env-file .env.local up
#
# Without --env-file, VITE_PADDLE_CLIENT_TOKEN and other frontend vars will be
# empty and Paddle checkout will fail.
#
# Services:
#   db        → PostgreSQL at localhost:5432
#   redis     → Redis at localhost:6379
#   minio     → MinIO S3-compatible storage at localhost:9000 (console at localhost:9001)
#   minio-init→ One-shot container that creates the dev bucket on first run
#   backend   → Django dev server at localhost:8000 (hot reload via mounted volume)
#   worker    → Celery worker (hot reload via mounted volume)
#   frontend  → Vite dev server at localhost:3000 (hot reload via mounted volume)

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: giflove
      POSTGRES_USER: giflove_user
      POSTGRES_PASSWORD: giflove_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giflove_user -d giflove"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — self-hosted S3-compatible object storage
  #   API:     http://localhost:9000   (used by Django/boto3)
  #   Console: http://localhost:9001   (web UI — login: minioadmin / minioadmin123)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init container — creates the dev bucket and sets it to public-read.
  # Runs once per `docker compose up`; exits 0 immediately after.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/giflove-dev &&
        mc anonymous set public local/giflove-dev &&
        echo 'MinIO bucket ready'
      "

  # ---------------------------------------------------------------------------
  # Django backend — hot reload via mounted source volume
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: >
      sh -c "python manage.py migrate --settings=giflove.settings.development &&
             python manage.py runserver 0.0.0.0:8000 --settings=giflove.settings.development"
    volumes:
      - ./backend:/app
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: giflove.settings.development
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Celery worker — hot reload via mounted source volume
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A giflove worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: giflove.settings.development
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Vite frontend — hot reload via mounted source volume
  # node_modules are stored in a named volume to avoid host/container conflicts
  # ---------------------------------------------------------------------------
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      # HMR WebSocket — browser connects back to this host.
      # 'localhost' works because Docker forwards port 3000 to the host.
      VITE_HMR_HOST: localhost
      # Backend proxy target (inside the Docker network)
      VITE_BACKEND_HOST: backend
      # Polling ensures file changes on the Windows NTFS volume are detected
      CHOKIDAR_USEPOLLING: "true"
      # Frontend-only VITE_ vars — injected via host-level substitution from .env.local.
      # Backend secrets (DB password, Django key, Paddle API key, etc.) are intentionally
      # excluded: they come from env_file on the backend/worker services only.
      VITE_PADDLE_CLIENT_TOKEN: ${VITE_PADDLE_CLIENT_TOKEN}
      VITE_PADDLE_ENVIRONMENT: ${VITE_PADDLE_ENVIRONMENT}
      VITE_PADDLE_PRICE_ESSENTIAL: ${VITE_PADDLE_PRICE_ESSENTIAL}
      VITE_PADDLE_PRICE_PREMIUM: ${VITE_PADDLE_PRICE_PREMIUM}
      VITE_PADDLE_PRICE_BULK: ${VITE_PADDLE_PRICE_BULK}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}

volumes:
  postgres_dev_data:
  minio_dev_data:
  frontend_node_modules:
